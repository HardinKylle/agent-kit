# agent-kit source of truth for role routing, verdict names, and default gates.
# Keep docs aligned to this file instead of repeating model assignments by hand.

roles:
  orchestrator:
    label: Orchestrator
    model: Claude Opus
    runtime: main session
    aliases: [lead]
  researcher:
    label: Researcher
    model: Gemini 3.1 Pro
    runtime: bin/ask-gemini.sh
    aliases: [research]
    # External facts/web only (own persistent Gemini session).
  architect:
    label: Architect
    model: Claude Opus
    runtime: Claude subagent
    aliases: [planner]
  implementer:
    label: Implementer
    model: Codex gpt-5.x
    runtime: bin/ask-codex.sh
    aliases: [codex, ui, frontend]
    # Owns ALL code: logic/engine/state + UI/CSS + APPLYING fixes. Persistent session A
    # (CODEX_ROLE=implementer → .codex_session_implementer.id).
  reviewer:
    label: Code Reviewer
    model: Codex gpt-5.x
    runtime: bin/ask-codex.sh
    aliases: [review]
    # FINDS bugs in the diff. Persistent session B, SEPARATE from the implementer
    # (CODEX_ROLE=reviewer → .codex_session_reviewer.id) — only ever sees diffs, never the
    # writer's reasoning, so it stays independent without re-introducing context each turn.
  qa-tester:
    label: QA / Tester
    model: Claude Sonnet
    runtime: Claude subagent
    aliases: [qa, tester]
    verdict_label: QA
    # Own persistent Claude Sonnet session (spawn once, resume via SendMessage). Runs the
    # official build/test/behavioral checks. Independent of Codex (author) and Gemini.
  design-critic:
    label: Design Critic
    model: Gemini 3.1 Pro
    runtime: bin/ask-gemini.sh
    aliases: [design, critic]
    verdict_label: DESIGN-CRITIC
    # Own persistent Gemini session. Runs in PARALLEL once the UI shell exists — batch its
    # findings back to the Implementer instead of blocking every turn.
  scribe:
    label: Scribe
    model: Claude Haiku
    runtime: Claude subagent
    aliases: [doc, docs]
  file-finder:
    label: File-Finder
    model: Claude Haiku / Explore
    runtime: Claude subagent
    aliases: [finder, explore]

workflow_modes:
  tiny:
    use_when: "copy/config/docs or a one-file low-risk fix"
    seats: [orchestrator]
    required_verdicts: []
    notes: "Run the local check directly; record the mode and summary. No cold seats by default."
  logic:
    use_when: "engine/state/API behavior changes without meaningful UI composition work"
    seats: [implementer, reviewer]
    required_verdicts: [reviewer]
    optional_verdicts: [qa-tester]
    notes: "Add QA when behavior is hard to verify from tests/build alone."
  ui:
    use_when: "components/layout/CSS/responsive/micro-interaction changes"
    seats: [implementer, qa-tester]
    required_verdicts: [qa-tester]
    optional_verdicts: [design-critic]
    notes: "Implementer (Codex) writes the UI. Use Design Critic for layout, visual hierarchy, brand/taste, or regression-sensitive UI — run it in parallel once the shell exists."
  production:
    use_when: "user-facing milestone, broad refactor, release, deploy, or high-risk work"
    seats: [researcher, architect, implementer, reviewer, qa-tester, design-critic, scribe]
    required_verdicts: [qa-tester, reviewer, scribe]
    ui_required_verdicts: [qa-tester, reviewer, design-critic, scribe]
    notes: "Full loop with scoped verdicts, changelog, and commit/deploy discipline."

gate_profiles:
  prototype:
    review_rounds: 1
    design_rounds: 1
    required_verdicts: [qa-tester]
    ui_required_verdicts: [qa-tester, design-critic]
  standard:
    review_rounds: 3
    design_rounds: 3
    required_verdicts: [qa-tester, reviewer]
    ui_required_verdicts: [qa-tester, reviewer, design-critic]
  production:
    review_rounds: 3
    design_rounds: 3
    required_verdicts: [qa-tester, reviewer, scribe]
    ui_required_verdicts: [qa-tester, reviewer, design-critic, scribe]

defaults:
  workflow_mode: logic
  gate_profile: standard
  context_file: .team/CONTEXT.md
  verdict_dir: .team/verdicts
  prompt_templates_dir: templates/prompts
  summary_only_feed: true
